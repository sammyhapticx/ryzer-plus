<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryzer - Keep all the bits that matter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #121212; color: #f5f5f5;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
    }
    .container { max-width: 800px; width: 100%; }
    h1 { text-align: center; margin-bottom: 20px; }
    .upload-area {
      border: 3px dashed #666; border-radius: 12px; padding: 40px; text-align: center;
      cursor: pointer; transition: all 0.3s; background: #1a1a1a;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #4f46e5; background: #1e1b4b; }
    input[type="file"] { display: none; }
    .controls {
      display: flex; flex-wrap: wrap; gap: 15px; margin: 20px 0; align-items: end;
    }
    .control-group { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 14px; opacity: 0.9; }
    input[type="range"] { width: 120px; }
    input[type="number"] { width: 80px; padding: 8px; background: #333; border: 1px solid #555; color: #fff; border-radius: 6px; }
    #aspectLock { transform: scale(1.5); }
    .preview-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0;
    }
    canvas { max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    button {
      padding: 12px 24px; background: #4f46e5; color: white; border: none; border-radius: 8px;
      cursor: pointer; font-size: 16px; transition: background 0.3s;
    }
    button:hover { background: #3730a3; }
    button:disabled { background: #333; cursor: not-allowed; }
    #info { text-align: center; opacity: 0.7; font-size: 14px; margin-top: 20px; }
    @media (max-width: 600px) {
      .preview-grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; align-items: stretch; }
      input[type="range"] { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1> Image Resizer (No Quality Loss)</h1>
    <div id="uploadArea" class="upload-area">
      <p> Drag image here or <label for="fileInput" style="color: #4f46e5; cursor: pointer;">click to upload</label></p>
      <p style="opacity: 0.7; font-size: 14px;">Supports JPG, PNG, GIF, WebP</p>
    </div>
    <input type="file" id="fileInput" accept="image/*">
    
    <div id="controls" class="controls" style="display: none;">
      <div class="control-group">
        <label>Max Width</label>
        <input type="range" id="maxWidth" min="100" max="2000" value="800">
        <input type="number" id="maxWidthNum" min="100" max="2000" value="800">
      </div>
      <div class="control-group">
        <label>Max Height</label>
        <input type="range" id="maxHeight" min="100" max="2000" value="800">
        <input type="number" id="maxHeightNum" min="100" max="2000" value="800">
      </div>
      <label style="white-space: nowrap;">
        <input type="checkbox" id="aspectLock" checked> Lock Aspect Ratio
      </label>
      <div class="control-group">
        <label>Quality</label>
        <input type="range" id="quality" min="0.5" max="1" step="0.05" value="1">
        <span id="qualityVal">100%</span>
      </div>
    </div>
    
    <div class="preview-grid" id="previews" style="display: none;">
      <div>
        <label>Original</label>
        <canvas id="originalCanvas"></canvas>
      </div>
      <div>
        <label>Resized Preview</label>
        <canvas id="previewCanvas"></canvas>
      </div>
    </div>
    
    <div class="buttons">
      <button id="downloadBtn" style="display: none;">💾 Download PNG</button>
      <button id="clearBtn">🗑️ Clear</button>
    </div>
    <p id="info"></p>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const controls = document.getElementById('controls');
    const previews = document.getElementById('previews');
    const originalCanvas = document.getElementById('originalCanvas');
    const previewCanvas = document.getElementById('previewCanvas');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const aspectLock = document.getElementById('aspectLock');
    const maxWidthRange = document.getElementById('maxWidth');
    const maxWidthNum = document.getElementById('maxWidthNum');
    const maxHeightRange = document.getElementById('maxHeight');
    const maxHeightNum = document.getElementById('maxHeightNum');
    const qualityRange = document.getElementById('quality');
    const qualityVal = document.getElementById('qualityVal');
    const info = document.getElementById('info');

    let originalImg = null;
    let originalCtx, previewCtx;

    // Sync number/range inputs
    maxWidthRange.addEventListener('input', () => { maxWidthNum.value = maxWidthRange.value; updatePreview(); });
    maxWidthNum.addEventListener('input', () => { maxWidthRange.value = maxWidthNum.value; updatePreview(); });
    maxHeightRange.addEventListener('input', () => { maxHeightNum.value = maxHeightRange.value; updatePreview(); });
    maxHeightNum.addEventListener('input', () => { maxHeightRange.value = maxHeightNum.value; updatePreview(); });
    qualityRange.addEventListener('input', () => {
      qualityVal.textContent = Math.round(qualityRange.value * 100) + '%';
      updatePreview();
    });

    // Upload handling
    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        originalImg = new Image();
        originalImg.onload = () => {
          originalCtx = originalCanvas.getContext('2d');
          originalCanvas.width = originalImg.width;
          originalCanvas.height = originalImg.height;
          originalCtx.imageSmoothingQuality = 'high';
          originalCtx.drawImage(originalImg, 0, 0);
          controls.style.display = 'flex';
          previews.style.display = 'grid';
          downloadBtn.style.display = 'inline-block';
          updatePreview();
          info.textContent = `Original: ${originalImg.width}x${originalImg.height} (${Math.round(originalImg.src.length * 0.0009765625 * 100) / 100}KB)`;
        };
        originalImg.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
      uploadArea.addEventListener(event, (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (event === 'dragenter' || event === 'dragover') uploadArea.classList.add('dragover');
        else uploadArea.classList.remove('dragover');
        if (event === 'drop') handleFile(e.dataTransfer.files[0]);
      });
    });

    function updatePreview() {
      if (!originalImg) return;
      previewCtx = previewCanvas.getContext('2d');
      
      const maxW = parseInt(maxWidthRange.value);
      const maxH = parseInt(maxHeightRange.value);
      let { width: w, height: h } = originalImg;
      
      if (aspectLock.checked) {
        if (w > h) {
          if (w > maxW) { h *= maxW / w; w = maxW; }
        } else {
          if (h > maxH) { w *= maxH / h; h = maxH; }
        }
      } else {
        w = Math.min(w, maxW);
        h = Math.min(h, maxH);
      }
      
      previewCanvas.width = w;
      previewCanvas.height = h;
      previewCtx.imageSmoothingEnabled = true;
      previewCtx.imageSmoothingQuality = 'high'; // Best quality[web:9][web:30]
      previewCtx.drawImage(originalImg, 0, 0, w, h);
      info.textContent += ` | Preview: ${Math.round(w)}x${Math.round(h)}`;
    }

    downloadBtn.addEventListener('click', () => {
      previewCanvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `resized-${Date.now()}.png`; // PNG for no loss[web:16]
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png', 1.0);
    });

    clearBtn.addEventListener('click', () => {
      originalImg = null;
      controls.style.display = 'none';
      previews.style.display = 'none';
      downloadBtn.style.display = 'none';
      uploadArea.innerHTML = '<p>📁 Drag image here or <label for="fileInput" style="color: #4f46e5; cursor: pointer;">click to upload</label></p><p style="opacity: 0.7; font-size: 14px;">Supports JPG, PNG, GIF, WebP</p>';
      info.textContent = '';
      fileInput.value = '';
    });

    aspectLock.addEventListener('change', updatePreview);
  </script>
</body>
</html>
